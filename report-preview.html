<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>QIMA 小程序 - 报告预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --carbon: #191919;
    --seal: #737373;
    --pool-500: #4169e1;
    --pool-050: #f2f5fd;
    --border: #dedede;
    --kiwi: #1f9d6b;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Inter, sans-serif;
    background: #c9ced8;
    color: var(--carbon);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { display: flex; justify-content: center; }

  .phone {
    position: relative;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #f2f5fc 0%, #fafbfe 100%);
    overflow: hidden;
  }
  .blob { position: absolute; border-radius: 68px; filter: blur(50px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 340px; height: 314px; background: #f58f00; opacity: .07; left: 230px; top: -130px; transform: rotate(30deg); }
  .blob-3 { width: 129px; height: 119px; background: #a086c4; opacity: .12; left: -70px; top: 0; transform: rotate(-30deg); }

  .statusbar {
    position: relative; z-index: 2;
    height: 47px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 27px 0 0;
  }
  .statusbar .time { width: 134px; text-align: center; font-weight: 600; font-size: 17px; letter-spacing: -.4px; padding-top: 4px; }
  .statusbar .indicators { display: flex; align-items: center; gap: 7px; padding-top: 4px; }
  .statusbar .indicators img { display: block; }

  .navbar {
    position: relative; z-index: 2;
    height: 44px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 17px;
  }
  .navbar .back { width: 12px; height: 20px; display: block; }
  .navbar .title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; letter-spacing: -.34px; color: var(--carbon);
    max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-capsule {
    width: 83px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,.7); border: .5px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
  }
  .nav-capsule img { width: 17px; height: 17px; }
  .nav-capsule .divider { width: 1px; height: 18px; background: #d2d2d2; }

  .meta-bar {
    position: relative; z-index: 2;
    padding: 4px 16px 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .meta-left { min-width: 0; }
  .meta-id {
    font-size: 14px; font-weight: 700; color: var(--carbon);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .meta-sub {
    margin-top: 2px; font-size: 11px; color: var(--seal);
  }
  .status-pill {
    flex-shrink: 0; height: 24px; padding: 0 10px; border-radius: 6px;
    background: #eaf6f2; color: var(--kiwi); border: 1px solid #c9ecdc;
    font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
  }

  .preview-scroll {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto;
    padding: 0 13px 16px;
  }
  .preview-scroll::-webkit-scrollbar { display: none; }

  .pdf-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0 0 12px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(25,25,25,.06);
  }
  .pdf-page {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 8px 8px 0 0;
    background: #fff;
  }
  .page-hint {
    text-align: center;
    font-size: 11px;
    color: var(--seal);
    padding: 10px 12px 0;
  }

  .bottom-actions {
    position: relative; z-index: 3;
    flex-shrink: 0;
    background: #fff;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -1px 6px rgba(0,0,0,.06);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    display: flex; gap: 10px;
  }
  .action-btn {
    flex: 1; height: 44px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border: none;
  }
  .action-btn.secondary {
    background: #fff; color: var(--pool-500);
    border: 1px solid #dce4fb;
  }
  .action-btn.primary {
    background: var(--pool-500); color: #fff;
    box-shadow: 0 6px 16px rgba(65,105,225,.28);
  }
  .action-btn:active { opacity: .9; }

  .toast {
    position: fixed; left: 50%; bottom: 110px; transform: translateX(-50%);
    background: rgba(25,25,25,.86); color: #fff; font-size: 13px;
    padding: 10px 14px; border-radius: 10px; opacity: 0; pointer-events: none;
    transition: opacity .2s ease; z-index: 30; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
<link rel="stylesheet" href="assets/phone-shell.css" />
<link rel="stylesheet" href="assets/lang-toggle.css" />
<link rel="stylesheet" href="assets/i18n-en.css" />
<script>window.PAGE_TITLE_KEY = 'title.reportPreview';</script>
<script src="assets/i18n/zh.js"></script>
<script src="assets/i18n/en.js"></script>
<script src="assets/i18n-runtime.js"></script>
</head>
<body>
  <div class="phone">
    <div class="blob blob-1"></div>
    <div class="blob blob-3"></div>

    <div class="statusbar">
      <div class="time">9:41</div>
      <div class="indicators">
        <img src="assets/signal.svg" alt="" width="18" height="12" />
        <img src="assets/wifi.svg" alt="" width="17" height="12" />
        <img src="assets/battery.svg" alt="" width="27" height="13" />
      </div>
    </div>

    <div class="navbar">
      <a href="reports.html"><img class="back" src="assets/vector52.svg" alt="返回" data-i18n-alt="common.back" /></a>
      <div class="title" data-i18n="reportPreview.title">报告预览</div>
      <div class="nav-capsule">
        <img src="assets/share.svg" alt="" />
        <div class="divider"></div>
        <img src="assets/home.svg" alt="" />
      </div>
    </div>

    <div class="meta-bar">
      <div class="meta-left">
        <div class="meta-id" id="reportId">T-24106085-11-R1</div>
        <div class="meta-sub" id="reportMeta">LAB · SKU-65120</div>
      </div>
      <div class="status-pill" id="reportStatus">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-i18n="reports.status.pass">PASS</span>
      </div>
    </div>

    <div class="preview-scroll">
      <div class="pdf-card">
        <img class="pdf-page" src="assets/report-pdf-preview.png" alt="Test report PDF preview" id="pdfImage" />
        <div class="page-hint" data-i18n="reportPreview.pageHint">第 1 页 · 共 12 页</div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="action-btn secondary" type="button" onclick="shareReport()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        <span data-i18n="reportPreview.share">分享</span>
      </button>
      <button class="action-btn primary" type="button" onclick="downloadReport()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>
        <span data-i18n="reportPreview.download">下载报告</span>
      </button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const REPORT_META = {
      'SKU-65120': { id: 'T-24106085-11-R1', tag: 'LAB', sku: 'SKU-65120', status: 'pass', nameKey: 'reports.product.toys' },
      'SKU-89231': { id: 'T-24106085-11-R1', tag: 'PSI', sku: 'SKU-89231', status: 'pass', nameKey: 'reports.product.psi' },
      'SKU-77321': { id: 'T-24106085-11-R1', tag: 'DUPRO', sku: 'SKU-77321', status: 'fail', nameKey: 'reports.product.textile' },
      'SKU-51840': { id: 'T-24106085-11-R1', tag: 'FRI', sku: 'SKU-51840', status: 'pass', nameKey: 'reports.product.electronics' },
      'SKU-43902': { id: 'T-24106085-11-R1', tag: 'LAB', sku: 'SKU-43902', status: 'pending', nameKey: 'reports.product.hardline' },
      'SKU-38771': { id: 'T-24106085-11-R1', tag: 'CSR', sku: 'SKU-38771', status: 'pass', nameKey: 'reports.product.food' }
    };

    function getSku() {
      return new URLSearchParams(window.location.search).get('sku') || 'SKU-65120';
    }

    function applyMeta() {
      const meta = REPORT_META[getSku()] || REPORT_META['SKU-65120'];
      const idEl = document.getElementById('reportId');
      const metaEl = document.getElementById('reportMeta');
      const statusEl = document.getElementById('reportStatus');
      if (idEl) idEl.textContent = meta.id;
      if (metaEl) {
        const name = (window.I18n && I18n.t) ? I18n.t(meta.nameKey) : meta.nameKey;
        metaEl.textContent = meta.tag + ' · ' + meta.sku + ' · ' + name;
      }
      if (statusEl) {
        const label = (window.I18n && I18n.t) ? I18n.t('reports.status.' + meta.status) : meta.status.toUpperCase();
        statusEl.className = 'status-pill' + (meta.status === 'fail' ? ' fail' : meta.status === 'pending' ? ' pending' : '');
        statusEl.innerHTML =
          (meta.status === 'fail'
            ? '<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>'
            : meta.status === 'pending'
              ? '<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M8 4v4l2.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
              : '<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>') +
          '<span>' + label + '</span>';
        if (meta.status === 'fail') {
          statusEl.style.background = '#fdecee';
          statusEl.style.color = '#e4002b';
          statusEl.style.borderColor = '#f5c2cb';
        } else if (meta.status === 'pending') {
          statusEl.style.background = '#fff8e8';
          statusEl.style.color = '#b8860b';
          statusEl.style.borderColor = '#f0e0a8';
        } else {
          statusEl.style.background = '';
          statusEl.style.color = '';
          statusEl.style.borderColor = '';
        }
      }
    }

    function showToast(key) {
      const toast = document.getElementById('toast');
      toast.textContent = (window.I18n && I18n.t) ? I18n.t(key) : key;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(function () { toast.classList.remove('show'); }, 1600);
    }

    function downloadReport() {
      const link = document.createElement('a');
      link.href = 'assets/report-pdf-preview.png';
      link.download = (document.getElementById('reportId').textContent || 'report') + '.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('reportPreview.downloaded');
    }

    function shareReport() {
      showToast('reportPreview.share');
    }

    applyMeta();
    if (window.I18n) {
      I18n.initLangToggle({ onLangApplied: applyMeta });
    }
  </script>
</body>
</html>

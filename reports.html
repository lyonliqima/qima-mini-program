<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>QIMA 小程序 - 报告中心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --carbon: #191919;
    --seal: #737373;
    --pool-500: #4169e1;
    --pool-100: #e6ecfb;
    --pool-050: #f2f5fd;
    --qima-red: #e4002b;
    --border: #dedede;
    --kiwi: #1f9d6b;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Inter, sans-serif;
    background: #c9ced8;
    color: var(--carbon);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { display: flex; justify-content: center; }

  .phone {
    position: relative;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #f2f5fc 0%, #fafbfe 100%);
    overflow: hidden;
  }
  .blob { position: absolute; border-radius: 68px; filter: blur(50px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 340px; height: 314px; background: #f58f00; opacity: .07; left: 230px; top: -130px; transform: rotate(30deg); }
  .blob-2 { width: 139px; height: 128px; background: #ff8e61; opacity: .08; left: 300px; top: 20px; transform: rotate(30deg); }
  .blob-3 { width: 129px; height: 119px; background: #a086c4; opacity: .12; left: -70px; top: 0; transform: rotate(-30deg); }
  .blob-4 { width: 129px; height: 119px; background: #ff9a7f; opacity: .12; left: -120px; top: 0; transform: rotate(-30deg); }

  /* 状态栏 */
  .statusbar {
    position: relative; z-index: 2;
    height: 47px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 27px 0 0;
  }
  .statusbar .time { width: 134px; text-align: center; font-weight: 600; font-size: 17px; letter-spacing: -.4px; padding-top: 4px; }
  .statusbar .indicators { display: flex; align-items: center; gap: 7px; padding-top: 4px; }
  .statusbar .indicators img { display: block; }

  /* 导航栏 */
  .navbar {
    position: relative; z-index: 2;
    height: 44px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 17px;
  }
  .navbar .back { width: 12px; height: 20px; }
  .navbar .title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; letter-spacing: -.34px; color: var(--carbon);
  }
  .nav-capsule {
    width: 83px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,.7); border: .5px solid var(--border);
    display: flex; align-items: center; justify-content: space-around; position: relative;
  }
  .nav-capsule img { width: 17px; height: 17px; }
  .nav-capsule .divider { width: 1px; height: 18px; background: #d2d2d2; }

  /* Hero 统计卡 */
  .hero {
    position: relative; z-index: 2;
    margin: 8px 16px 4px;
    background: linear-gradient(120deg, #eef2fd 0%, #f7f4fd 100%);
    border: 1px solid #e6ecfb;
    border-radius: 16px;
    padding: 18px 18px;
    display: flex; align-items: center; justify-content: space-between;
    overflow: hidden;
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-num {
    font-size: 34px; font-weight: 700; color: var(--pool-500);
    line-height: 1; letter-spacing: -.5px;
  }
  .hero-num .unit { font-size: 15px; font-weight: 600; color: var(--carbon); margin-left: 6px; }
  .hero-label { margin-top: 6px; font-size: 12px; color: rgba(99,99,99,.9); }
  .hero-art {
    font-size: 46px; line-height: 1;
    filter: drop-shadow(0 6px 10px rgba(65,105,225,.18));
  }

  /* 筛选标签 */
  .cat-tabs {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 4px;
    overflow-x: auto;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat {
    flex-shrink: 0; height: 30px; padding: 0 14px; border-radius: 999px;
    background: #fff; border: 1px solid #e6e9f2;
    font-size: 13px; color: var(--seal);
    display: flex; align-items: center;
    cursor: pointer;
  }
  .cat.active { background: var(--pool-500); border-color: var(--pool-500); color: #fff; font-weight: 600; }
  .cat-filter {
    flex-shrink: 0; margin-left: auto;
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--pool-050); border: 1px solid #dce4fb; color: var(--pool-500);
    display: flex; align-items: center; justify-content: center;
  }

  /* 报告网格 */
  .grid {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 12px 16px 20px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    align-content: start;
  }
  .grid::-webkit-scrollbar { display: none; }

  /* 文件夹式报告卡 */
  .rcard {
    position: relative;
    border-radius: 14px;
    padding: 30px 14px 14px;
    min-height: 150px;
    color: #fff;
    text-decoration: none;
    display: flex; flex-direction: column;
    box-shadow: 0 6px 16px rgba(25,25,25,.12);
    overflow: hidden;
    cursor: pointer;
  }
  /* 卡顶部露出的“文件” */
  .rcard::before {
    content: ""; position: absolute;
    top: 8px; left: 16px; right: 40px; height: 26px;
    background: #f4f6fb; border-radius: 6px 6px 0 0;
    box-shadow: 2px -2px 0 -1px #e2e6ef, -2px -2px 0 -1px #e9ecf3;
    z-index: 0;
  }
  /* 文件夹前袋 */
  .rcard::after {
    content: ""; position: absolute;
    left: 0; right: 0; bottom: 0; top: 26px;
    border-radius: 14px;
    z-index: 1;
  }
  .rcard.c-blue::after { background: linear-gradient(160deg, #6f9bff 0%, #4169e1 100%); }
  .rcard.c-purple::after { background: linear-gradient(160deg, #b18ce0 0%, #8455c6 100%); }
  .rcard.c-teal::after { background: linear-gradient(160deg, #45c2a8 0%, #1f9d84 100%); }
  .rcard.c-orange::after { background: linear-gradient(160deg, #ffb066 0%, #f58f00 100%); }
  .rcard > * { position: relative; z-index: 2; }

  .rcard .tag {
    align-self: flex-start;
    background: rgba(255,255,255,.24);
    border: 1px solid rgba(255,255,255,.4);
    border-radius: 6px; padding: 2px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    margin-bottom: 22px;
  }
  .rcard .rname { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .rcard .rsku { margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.85); }
  .rcard .rstatus {
    margin-top: 12px; display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700;
  }
  .rcard .rstatus .dot {
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
  }
  .rcard .rstatus.pass .dot { color: var(--kiwi); }
  .rcard .rstatus.fail .dot { color: var(--qima-red); }
  .rcard .rstatus.pending .dot { color: #b8860b; }
  .rcard .rstatus .dot svg { width: 10px; height: 10px; }

  /* Tab Bar */
  .tabbar {
    position: relative; z-index: 3;
    width: 100%; height: 71.5px; flex-shrink: 0;
    background: #fff; border-radius: 12px 12px 0 0;
    box-shadow: 0 -1px 6px rgba(0,0,0,.06);
    display: flex; align-items: flex-start;
  }
  .tab {
    flex: 1; height: 71px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 10px 0 20px; text-decoration: none;
  }
  .tab img { width: 22px; height: 22px; }
  .tab .label { font-size: 10px; letter-spacing: .1px; color: var(--seal); }
  .tab.active .label { color: var(--pool-500); font-weight: 600; }
  .tab .icon-spacer { width: 20.2px; height: 15px; }

  .fab {
    position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--pool-500);
    box-shadow: 0 6px 16px rgba(65,105,225,.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
  }
  .fab img { width: 24px; height: 24px; }
</style>
<link rel="stylesheet" href="assets/phone-shell.css" />
<link rel="stylesheet" href="assets/lang-toggle.css" />
<link rel="stylesheet" href="assets/i18n-en.css" />
<script>window.PAGE_TITLE_KEY = 'title.reports';</script>
<script src="assets/i18n/zh.js"></script>
<script src="assets/i18n/en.js"></script>
<script src="assets/i18n-runtime.js"></script>
</head>
<body>
  <div class="phone">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <!-- 状态栏 -->
    <div class="statusbar">
      <div class="time">9:41</div>
      <div class="indicators">
        <img src="assets/signal.svg" alt="" width="18" height="12" />
        <img src="assets/wifi.svg" alt="" width="17" height="12" />
        <img src="assets/battery.svg" alt="" width="27" height="13" />
      </div>
    </div>

    <!-- 导航栏 -->
    <div class="navbar">
      <a href="index.html"><img class="back" src="assets/vector52.svg" alt="返回" data-i18n-alt="common.back" /></a>
      <div class="title" data-i18n="reports.title">报告中心</div>
      <div class="nav-capsule">
        <img src="assets/share.svg" alt="" />
        <div class="divider"></div>
        <img src="assets/home.svg" alt="" />
      </div>
    </div>

    <!-- Hero 统计 -->
    <div class="hero">
      <div class="hero-text">
        <div class="hero-num">128<span class="unit" data-i18n="reports.statUnit">Reports</span></div>
        <div class="hero-label" data-i18n="reports.statLabel">全部报告</div>
      </div>
      <div class="hero-art">📚</div>
    </div>

    <!-- 筛选标签 -->
    <div class="cat-tabs" id="catTabs">
      <div class="cat active" data-cat="all" data-i18n="reports.filterAll">全部</div>
      <div class="cat" data-cat="psi">PSI</div>
      <div class="cat" data-cat="dupro">DUPRO</div>
      <div class="cat" data-cat="fri">FRI</div>
      <div class="cat" data-cat="lab">LAB</div>
      <div class="cat" data-cat="csr">CSR</div>
      <div class="cat-filter">
        <svg width="14" height="14" viewBox="0 0 16 16"><path d="M2 3h12M4.5 8h7M6.5 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- 报告网格 -->
    <div class="grid" id="reportGrid"></div>

    <!-- 底部 Tab Bar -->
    <div class="tabbar">
      <a class="tab" href="index.html">
        <img src="assets/tab_home.svg" alt="" />
        <span class="label" data-i18n="common.tab.home">首页</span>
      </a>
      <a class="tab" href="orders.html">
        <img src="assets/tab_order.svg" alt="" />
        <span class="label" data-i18n="common.tab.orders">订单</span>
      </a>
      <a class="tab center" href="#">
        <span class="icon-spacer"></span>
      </a>
      <a class="tab active" href="reports.html">
        <img src="assets/tab_report.svg" alt="" />
        <span class="label" data-i18n="common.tab.reports">报告</span>
      </a>
      <a class="tab" href="#">
        <img src="assets/tab_me.svg" alt="" />
        <span class="label" data-i18n="common.tab.me">我的</span>
      </a>
      <div class="fab"><img src="assets/fab_add.svg" alt="下单" data-i18n-alt="common.fabOrder" /></div>
    </div>
  </div>

  <script>
    const REPORTS = [
      { cat: 'psi',   color: 'c-blue',   tag: 'PSI',   nameKey: 'reports.product.psi',        sku: 'SKU-89231', status: 'pass' },
      { cat: 'dupro', color: 'c-purple', tag: 'DUPRO', nameKey: 'reports.product.textile',    sku: 'SKU-77321', status: 'fail' },
      { cat: 'lab',   color: 'c-teal',   tag: 'LAB',   nameKey: 'reports.product.toys',       sku: 'SKU-65120', status: 'pass' },
      { cat: 'fri',   color: 'c-orange', tag: 'FRI',   nameKey: 'reports.product.electronics',sku: 'SKU-51840', status: 'pass' },
      { cat: 'lab',   color: 'c-blue',   tag: 'LAB',   nameKey: 'reports.product.hardline',   sku: 'SKU-43902', status: 'pending' },
      { cat: 'csr',   color: 'c-purple', tag: 'CSR',   nameKey: 'reports.product.food',       sku: 'SKU-38771', status: 'pass' },
    ];

    const ICONS = {
      pass: '<svg viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      fail: '<svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>',
      pending: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 4v4l2.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    let currentCat = 'all';

    function t(key){ return (window.I18n && I18n.t) ? I18n.t(key) : key; }

    function renderReports(){
      const grid = document.getElementById('reportGrid');
      const list = REPORTS.filter(r => currentCat === 'all' || r.cat === currentCat);
      if(!list.length){
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--seal);font-size:13px;padding:40px 0;">'+t('reports.emptyHint')+'</div>';
        return;
      }
      grid.innerHTML = list.map(r =>
        '<a class="rcard '+r.color+'" href="#">'+
          '<span class="tag">'+r.tag+'</span>'+
          '<div class="rname">'+t(r.nameKey)+'</div>'+
          '<div class="rsku">'+r.sku+'</div>'+
          '<div class="rstatus '+r.status+'"><span class="dot">'+ICONS[r.status]+'</span>'+t('reports.status.'+r.status)+'</div>'+
        '</a>'
      ).join('');
    }

    document.getElementById('catTabs').addEventListener('click', function(e){
      const chip = e.target.closest('.cat');
      if(!chip) return;
      currentCat = chip.getAttribute('data-cat');
      document.querySelectorAll('.cat').forEach(c => c.classList.toggle('active', c === chip));
      renderReports();
    });

    renderReports();

    if (window.I18n) {
      I18n.initLangToggle({ onLangApplied: renderReports });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>QIMA 小程序 - 报告中心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --carbon: #191919;
    --seal: #737373;
    --pool-500: #4169e1;
    --pool-100: #e6ecfb;
    --pool-050: #f2f5fd;
    --qima-red: #e4002b;
    --border: #dedede;
    --kiwi: #1f9d6b;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Inter, sans-serif;
    background: #c9ced8;
    color: var(--carbon);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { display: flex; justify-content: center; }

  .phone {
    position: relative;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #f2f5fc 0%, #fafbfe 100%);
    overflow: hidden;
  }
  .blob { position: absolute; border-radius: 68px; filter: blur(50px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 340px; height: 314px; background: #f58f00; opacity: .07; left: 230px; top: -130px; transform: rotate(30deg); }
  .blob-2 { width: 139px; height: 128px; background: #ff8e61; opacity: .08; left: 300px; top: 20px; transform: rotate(30deg); }
  .blob-3 { width: 129px; height: 119px; background: #a086c4; opacity: .12; left: -70px; top: 0; transform: rotate(-30deg); }
  .blob-4 { width: 129px; height: 119px; background: #ff9a7f; opacity: .12; left: -120px; top: 0; transform: rotate(-30deg); }

  /* 状态栏 */
  .statusbar {
    position: relative; z-index: 2;
    height: 47px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 27px 0 0;
  }
  .statusbar .time { width: 134px; text-align: center; font-weight: 600; font-size: 17px; letter-spacing: -.4px; padding-top: 4px; }
  .statusbar .indicators { display: flex; align-items: center; gap: 7px; padding-top: 4px; }
  .statusbar .indicators img { display: block; }

  /* 导航栏 */
  .navbar {
    position: relative; z-index: 2;
    height: 44px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 17px;
  }
  .navbar .back { width: 12px; height: 20px; }
  .navbar .title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; letter-spacing: -.34px; color: var(--carbon);
  }
  .nav-capsule {
    width: 83px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,.7); border: .5px solid var(--border);
    display: flex; align-items: center; justify-content: space-around; position: relative;
  }
  .nav-capsule img { width: 17px; height: 17px; }
  .nav-capsule .divider { width: 1px; height: 18px; background: #d2d2d2; }

  /* Hero 统计卡 */
  .hero {
    position: relative; z-index: 2;
    margin: 8px 16px 4px;
    background: linear-gradient(120deg, #eef2fd 0%, #f7f4fd 100%);
    border: 1px solid #e6ecfb;
    border-radius: 16px;
    padding: 18px 18px;
    display: flex; align-items: center; justify-content: space-between;
    overflow: hidden;
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-num {
    font-size: 34px; font-weight: 700; color: var(--pool-500);
    line-height: 1; letter-spacing: -.5px;
  }
  .hero-num .unit { font-size: 15px; font-weight: 600; color: var(--carbon); margin-left: 6px; }
  .hero-label { margin-top: 6px; font-size: 12px; color: rgba(99,99,99,.9); }
  .hero-art {
    font-size: 46px; line-height: 1;
    filter: drop-shadow(0 6px 10px rgba(65,105,225,.18));
  }

  /* 筛选标签 */
  .cat-tabs {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 4px;
    overflow-x: auto;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat {
    flex-shrink: 0; height: 30px; padding: 0 14px; border-radius: 999px;
    background: #fff; border: 1px solid #e6e9f2;
    font-size: 13px; color: var(--seal);
    display: flex; align-items: center;
    cursor: pointer;
  }
  .cat.active { background: var(--pool-500); border-color: var(--pool-500); color: #fff; font-weight: 600; }
  .cat-filter {
    flex-shrink: 0; margin-left: auto;
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--pool-050); border: 1px solid #dce4fb; color: var(--pool-500);
    display: flex; align-items: center; justify-content: center;
  }

  /* 报告列表 */
  .list {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 8px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .list::-webkit-scrollbar { display: none; }
  .rlist-card {
    position: relative; display: block; overflow: hidden;
    background:
      linear-gradient(135deg, rgba(65,105,225,.07), rgba(255,255,255,0) 42%),
      #fff;
    border: 1px solid #e6ebf6; border-radius: 14px;
    box-shadow: 0 6px 18px rgba(25,25,25,.07);
    padding: 12px 12px 11px 16px;
    color: inherit; text-decoration: none; cursor: pointer;
  }
  .rlist-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--pool-500);
  }
  .rlist-card.pass::before { background: var(--kiwi); }
  .rlist-card.fail::before { background: var(--qima-red); }
  .rlist-card.pending::before { background: #d39b16; }
  .rlist-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .rlist-title { min-width: 0; }
  .rlist-name { font-size: 15px; font-weight: 700; color: var(--carbon); line-height: 1.25; }
  .rlist-sku { margin-top: 2px; font-size: 12px; color: var(--seal); }
  .rlist-status {
    flex-shrink: 0; font-size: 11px; height: 22px; line-height: 20px; padding: 0 9px;
    border-radius: 999px; font-weight: 700; letter-spacing: .2px;
  }
  .rlist-status.pass { background: #eaf6f2; color: var(--kiwi); border: 1px solid #c9ecdc; }
  .rlist-status.fail { background: #fdecee; color: var(--qima-red); border: 1px solid #f5c2cb; }
  .rlist-status.pending { background: #fff8e8; color: #b8860b; border: 1px solid #f0e0a8; }
  .rlist-meta {
    display: flex; align-items: center; gap: 6px; min-width: 0;
    margin-top: 9px; color: var(--seal); font-size: 11px;
  }
  .rlist-meta svg { color: #9aa0ad; flex-shrink: 0; width: 12px; height: 12px; }
  .rlist-meta .report-no { color: var(--carbon); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rlist-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: #c4cad6; flex-shrink: 0; }
  .rlist-bottom {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-top: 10px; padding-top: 9px; border-top: .5px solid #eef0f4;
  }
  .rlist-preview {
    color: var(--pool-500); font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .rlist-preview svg { width: 13px; height: 13px; }
  .rlist-chev { width: 24px; height: 24px; border-radius: 50%; background: var(--pool-050); color: var(--pool-500); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .rlist-chev svg { width: 13px; height: 13px; }

  /* 旧版文件夹网格：先隐藏保留代码 */
  .grid.folder-grid-legacy {
    display: none !important;
  }

  /* 报告网格（旧） */
  .grid {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 12px 16px 20px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    align-content: start;
  }
  .grid::-webkit-scrollbar { display: none; }

  /* 文件夹式报告卡（拟物） */
  .rcard {
    position: relative;
    display: block;
    min-height: 176px;
    text-decoration: none;
    color: #fff;
    cursor: pointer;
    filter: drop-shadow(0 10px 18px rgba(25,25,25,.16));
    transition: transform .12s ease;
  }
  .rcard:active { transform: translateY(1px) scale(.994); }
  .rcard.c-blue   { --c1:#7aa0ff; --c2:#4169e1; --cback:#2f4fb8; --ctab:#3a5cd0; }
  .rcard.c-purple { --c1:#b691e6; --c2:#8455c6; --cback:#623a9d; --ctab:#7a4cbb; }
  .rcard.c-teal   { --c1:#4fcbae; --c2:#1f9d84; --cback:#147460; --ctab:#1a8f75; }
  .rcard.c-orange { --c1:#ffbb77; --c2:#f58f00; --cback:#c96f00; --ctab:#e88400; }

  /* 文件夹后板 + 顶部标签页 */
  .rcard .folder-back {
    position: absolute; inset: 0; top: 12px;
    border-radius: 10px 14px 14px 14px;
    background: var(--cback);
  }
  .rcard .folder-back::before {
    content: ""; position: absolute; top: -11px; left: 0;
    width: 96px; height: 16px;
    background: var(--ctab);
    border-radius: 8px 12px 0 0;
  }
  .rcard .folder-back::after {
    content: ""; position: absolute; top: -11px; left: 90px;
    width: 22px; height: 16px;
    background: var(--ctab);
    transform: skewX(32deg);
    border-radius: 0 6px 0 0;
  }

  /* 露出的纸张 */
  .rcard .papers { position: absolute; left: 12px; right: 12px; top: 20px; height: 52px; }
  .rcard .papers i {
    position: absolute; left: 0; right: 0; top: 0; height: 52px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,.12);
  }
  .rcard .papers i:nth-child(1) { background: #dfe4ee; transform: rotate(-3.5deg); right: 10px; }
  .rcard .papers i:nth-child(2) { background: #eef1f7; transform: rotate(2.5deg); left: 8px; }
  .rcard .papers i:nth-child(3) {
    background:
      repeating-linear-gradient(#ffffff 0 6px, #e6eaf1 6px 7px) top/100% 100%;
    background-color: #fff;
  }

  /* 文件夹前袋 */
  .rcard .pocket {
    position: absolute; left: 0; right: 0; bottom: 0; top: 46px;
    border-radius: 3px 3px 14px 14px;
    padding: 14px 14px 14px;
    background: linear-gradient(158deg, var(--c1) 0%, var(--c2) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.4),
      0 -5px 10px rgba(0,0,0,.14);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  /* 前袋开口处高光 + 内阴影，营造纸插入袋子的感觉 */
  .rcard .pocket::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0));
    pointer-events: none;
  }
  /* 前袋右下角折角高光 */
  .rcard .pocket::after {
    content: ""; position: absolute; right: -30px; bottom: -30px;
    width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,0) 70%);
    pointer-events: none;
  }

  .rcard .tag {
    align-self: flex-start;
    background: rgba(255,255,255,.26);
    border: 1px solid rgba(255,255,255,.45);
    border-radius: 6px; padding: 2px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: .6px;
    margin-bottom: 12px;
    backdrop-filter: blur(2px);
  }
  .rcard .rname { font-size: 15px; font-weight: 700; line-height: 1.3; text-shadow: 0 1px 2px rgba(0,0,0,.12); }
  .rcard .rsku { margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.9); }
  .rcard .rstatus {
    margin-top: auto; padding-top: 12px;
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700;
  }
  .rcard .rstatus .dot {
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .rcard .rstatus.pass .dot { color: var(--kiwi); }
  .rcard .rstatus.fail .dot { color: var(--qima-red); }
  .rcard .rstatus.pending .dot { color: #b8860b; }
  .rcard .rstatus .dot svg { width: 10px; height: 10px; }

  /* Tab Bar */
  .tabbar {
    position: relative; z-index: 3;
    width: 100%; height: 71.5px; flex-shrink: 0;
    background: #fff; border-radius: 12px 12px 0 0;
    box-shadow: 0 -1px 6px rgba(0,0,0,.06);
    display: flex; align-items: flex-start;
  }
  .tab {
    flex: 1; height: 71px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 10px 0 20px; text-decoration: none;
  }
  .tab img { width: 22px; height: 22px; }
  .tab .label { font-size: 10px; letter-spacing: .1px; color: var(--seal); }
  .tab.active .label { color: var(--pool-500); font-weight: 600; }
  .tab .icon-spacer { width: 20.2px; height: 15px; }

  .fab {
    position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--pool-500);
    box-shadow: 0 6px 16px rgba(65,105,225,.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
  }
  .fab img { width: 24px; height: 24px; }
</style>

    <div class="statusbar">

      <div class="cat" data-cat="all" data-i18n="reports.filterAll">全部</div>
      <div class="cat" data-cat="psi">PSI</div>
      <div class="cat" data-cat="dupro">DUPRO</div>

      -->
      <div class="cat-filter">
        <svg width="14" height="14" viewBox="0 0 16 16"><path d="M2 3h12M4.5 8h7M6.5 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

  <script>
    const USE_FOLDER_VIEW = false; // 旧文件夹视图开关，先关闭保留代码

    const REPORTS = [
      { cat: 'psi',   color: 'c-blue',   tag: 'PSI',   nameKey: 'reports.product.psi',        sku: 'SKU-89231', status: 'pass',    reportId: 'T-24106085-11-R1', date: '2026-06-03' },
      { cat: 'dupro', color: 'c-purple', tag: 'DUPRO', nameKey: 'reports.product.textile',    sku: 'SKU-77321', status: 'fail',    reportId: 'T-24106086-11-R1', date: '2026-06-02' },
      { cat: 'lab',   color: 'c-teal',   tag: 'LAB',   nameKey: 'reports.product.toys',       sku: 'SKU-65120', status: 'pass',    reportId: 'T-24106085-11-R1', date: '2026-06-03' },
      { cat: 'fri',   color: 'c-orange', tag: 'FRI',   nameKey: 'reports.product.electronics',sku: 'SKU-51840', status: 'pass',    reportId: 'T-24106087-11-R1', date: '2026-05-28' },
      { cat: 'lab',   color: 'c-blue',   tag: 'LAB',   nameKey: 'reports.product.hardline',   sku: 'SKU-43902', status: 'pending', reportId: 'T-24106088-11-R1', date: '2026-05-20' },
      { cat: 'csr',   color: 'c-purple', tag: 'CSR',   nameKey: 'reports.product.food',       sku: 'SKU-38771', status: 'pass',    reportId: 'T-24106089-11-R1', date: '2026-05-12' },
    ];

    const ICONS = {
      pass: '<svg viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      fail: '<svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>',
      pending: '<svg viewBox="0 0 16 16" fill="none"><path d="M8 4v4l2.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    let currentCat = 'lab';

    function t(key){ return (window.I18n && I18n.t) ? I18n.t(key) : key; }

    function filteredReports(){
      return REPORTS.filter(r => currentCat === 'all' || r.cat === currentCat);
    }

    function renderReportList(){
      const listEl = document.getElementById('reportList');
      if(!listEl) return;
      const list = filteredReports();
      if(!list.length){
        listEl.innerHTML = '<div style="text-align:center;color:var(--seal);font-size:13px;padding:40px 0;">'+t('reports.emptyHint')+'</div>';
        return;
      }
      listEl.innerHTML = list.map(r =>
        '<a class="rlist-card '+r.status+'" href="report-preview.html?sku='+encodeURIComponent(r.sku)+'">'+
          '<div class="rlist-top">'+
            '<div class="rlist-title">'+
              '<div class="rlist-name">'+t(r.nameKey)+'</div>'+
              '<div class="rlist-sku">'+r.sku+'</div>'+
            '</div>'+
            '<div class="rlist-status '+r.status+'">'+t('reports.status.'+r.status)+'</div>'+
          '</div>'+
          '<div class="rlist-meta">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H8a2 2 0 0 0-2 2v12"/><path d="M18 8H10a2 2 0 0 0-2 2v10h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Z"/><path d="M12 12h4M12 15h4"/></svg>'+
            '<span>'+t('reportPreview.reportNo')+'</span>'+
            '<span class="report-no">'+r.reportId+'</span>'+
            '<span class="dot"></span>'+
            '<span>'+r.date+'</span>'+
          '</div>'+
          '<div class="rlist-bottom">'+
            '<span class="rlist-preview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>'+t('reportPreview.title')+'</span>'+
            '<span class="rlist-chev"><svg viewBox="0 0 16 16" fill="none"><path d="M6 3.5 10.5 8 6 12.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'+
          '</div>'+
        '</a>'
      ).join('');
    }

    // 旧文件夹渲染：先保留，USE_FOLDER_VIEW=true 时可恢复
    function renderFolderGrid(){
      const grid = document.getElementById('reportGrid');
      if(!grid) return;
      const list = filteredReports();
      if(!list.length){
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--seal);font-size:13px;padding:40px 0;">'+t('reports.emptyHint')+'</div>';
        return;
      }
      grid.innerHTML = list.map(r =>
        '<a class="rcard '+r.color+'" href="report-preview.html?sku='+encodeURIComponent(r.sku)+'">'+
          '<span class="folder-back"></span>'+
          '<span class="papers"><i></i><i></i><i></i></span>'+
          '<div class="pocket">'+
            '<span class="tag">'+r.tag+'</span>'+
            '<div class="rname">'+t(r.nameKey)+'</div>'+
            '<div class="rsku">'+r.sku+'</div>'+
            '<div class="rstatus '+r.status+'"><span class="dot">'+ICONS[r.status]+'</span>'+t('reports.status.'+r.status)+'</div>'+
          '</div>'+
        '</a>'
      ).join('');
    }

    function renderReports(){
      if(USE_FOLDER_VIEW){
        document.getElementById('reportList').style.display = 'none';
        const grid = document.getElementById('reportGrid');
        grid.hidden = false;
        grid.classList.remove('folder-grid-legacy');
        renderFolderGrid();
      } else {
        document.getElementById('reportList').style.display = '';
        const grid = document.getElementById('reportGrid');
        grid.hidden = true;
        grid.classList.add('folder-grid-legacy');
        renderReportList();
      }
    }

    document.getElementById('catTabs').addEventListener('click', function(e){
      const chip = e.target.closest('.cat');
      if(!chip) return;
      currentCat = chip.getAttribute('data-cat');
      document.querySelectorAll('.cat').forEach(c => c.classList.toggle('active', c === chip));
      renderReports();
    });

    document.querySelectorAll('.cat').forEach(c => c.classList.toggle('active', c.getAttribute('data-cat') === currentCat));
    renderReports();

    if (window.I18n) {
      I18n.initLangToggle({ onLangApplied: renderReports });
    }
  </script>
</body>
</html>

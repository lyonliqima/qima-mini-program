<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>QIMA 小程序 - 订单</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --carbon: #191919;
    --seal: #737373;
    --pool-500: #4169e1;
    --pool-100: #e6ecfb;
    --pool-050: #f2f5fd;
    --qima-red: #e4002b;
    --border: #dedede;
    --kiwi: #1f9d6b;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Inter, sans-serif;
    background: #c9ced8;
    color: var(--carbon);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { display: flex; justify-content: center; }

  /* ===== 手机外壳（固定高度，列表内部滚动）===== */
  .phone {
    position: relative;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #f2f5fc 0%, #fafbfe 100%);
    overflow: hidden;
  }
  .blob { position: absolute; border-radius: 68px; filter: blur(50px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 340px; height: 314px; background: #f58f00; opacity: .07; left: 230px; top: -130px; transform: rotate(30deg); }
  .blob-3 { width: 129px; height: 119px; background: #a086c4; opacity: .12; left: -70px; top: 0; transform: rotate(-30deg); }
  .blob-4 { width: 129px; height: 119px; background: #ff9a7f; opacity: .12; left: -120px; top: 0; transform: rotate(-30deg); }

  /* ===== 状态栏 ===== */
  .statusbar {
    position: relative; z-index: 2;
    height: 47px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 27px 0 0;
  }
  .statusbar .time { width: 134px; text-align: center; font-weight: 600; font-size: 17px; letter-spacing: -.4px; padding-top: 4px; }
  .statusbar .indicators { display: flex; align-items: center; gap: 7px; padding-top: 4px; }
  .statusbar .indicators img { display: block; }

  /* ===== 导航栏（标题居中）===== */
  .navbar {
    position: relative; z-index: 2;
    height: 44px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 17px;
  }
  .navbar .back { width: 12px; height: 20px; }
  .navbar .title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; letter-spacing: -.34px; color: var(--carbon);
  }
  .nav-capsule {
    width: 83px; height: 30px; border-radius: 15px;
    background: rgba(255,255,255,.7); border: .5px solid var(--border);
    display: flex; align-items: center; justify-content: space-around; position: relative;
  }
  .nav-capsule img { width: 17px; height: 17px; }
  .nav-capsule .divider { width: 1px; height: 18px; background: #d2d2d2; }

  /* ===== 筛选区 ===== */
  .filterbar { position: relative; z-index: 2; padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 10px; }
  .filter-row1 { display: flex; align-items: center; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    height: 36px; padding: 0 10px; border-radius: 8px;
    background: #fff; border: 1px solid #e6e9f2;
    font-size: 12px; color: var(--carbon); white-space: nowrap;
  }
  .chip .caret { color: var(--seal); }
  .search {
    flex: 1; min-width: 0; height: 36px; border-radius: 8px;
    background: #fff; border: 1px solid #e6e9f2;
    display: flex; align-items: center; gap: 6px; padding: 0 10px;
  }
  .search svg { color: #9aa0ad; flex-shrink: 0; }
  .search input {
    border: none; outline: none; background: transparent; width: 100%;
    font-size: 13px; color: var(--carbon);
  }
  .search input::placeholder { color: #aab0bc; }
  .filter-btn {
    flex-shrink: 0; height: 36px; padding: 0 12px; border-radius: 8px;
    background: var(--pool-050); color: var(--pool-500);
    display: flex; align-items: center; gap: 4px; font-size: 13px;
    border: 1px solid #dce4fb;
  }
  .filter-row2 { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .selector { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--seal); }
  .selector .caret { color: #aab0bc; }

  /* ===== 列表滚动区 ===== */
  .list {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 4px 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .list::-webkit-scrollbar { display: none; }

  /* ===== 订单卡片 ===== */
  .ocard {
    display: block;
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 10px rgba(25,25,25,.08);
    padding: 14px 16px 12px;
    color: inherit;
    text-decoration: none;
    cursor: pointer;
  }
  .ocard-head { display: flex; align-items: center; justify-content: space-between; }
  .ocard-head .left { display: flex; align-items: center; gap: 6px; }
  .ocard-head .left img { width: 16px; height: 16px; }
  .ocard-head .left .lbl { font-size: 14px; color: var(--carbon); }
  .ocard-head .left .num { font-size: 15px; font-weight: 600; color: var(--carbon); }
  .status {
    display: inline-flex; align-items: center;
    font-size: 12px; height: 24px; line-height: 1; padding: 0 10px; border-radius: 6px;
    white-space: nowrap; flex-shrink: 0; box-sizing: border-box;
  }
  .status.blue { background: var(--pool-050); color: var(--pool-500); border: 1px solid #dce4fb; }
  .status.green { background: #eaf6f2; color: var(--kiwi); border: 1px solid #c9ecdc; }

  .ocard-dates { display: flex; gap: 8px; margin-top: 12px; }
  .date-pill {
    display: flex; align-items: center; gap: 5px;
    background: #f4f6fa; border-radius: 6px; padding: 5px 8px;
    font-size: 11px; color: var(--seal); white-space: nowrap;
  }
  .date-pill svg { color: #9aa0ad; flex-shrink: 0; }

  .ocard-product { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .ocard-product.text-only {
    margin-top: 12px;
    padding: 10px 12px;
    background: #f7f8fb;
    border-radius: 10px;
    gap: 10px;
  }
  .thumb {
    position: relative; width: 64px; height: 64px; border-radius: 8px; overflow: hidden; flex-shrink: 0;
  }
  .thumb.fabric-black { background: linear-gradient(135deg, #34343a 0%, #0e0e12 100%); }
  .thumb.fabric-denim { background: linear-gradient(135deg, #2c3656 0%, #10162a 100%); }
  .thumb.fabric-grey { background: linear-gradient(135deg, #5a5f6b 0%, #2c303a 100%); }
  .thumb::after {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0 2px, transparent 2px 4px);
  }
  .thumb:empty { display: none; }
  .ribbon {
    position: absolute; top: 9px; right: -20px; z-index: 2;
    transform: rotate(45deg);
    background: var(--kiwi); color: #fff;
    font-size: 9px; line-height: 14px; padding: 0 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .pinfo { flex: 1; min-width: 0; }
  .pinfo .pname {
    font-size: 15px; color: var(--carbon); font-weight: 600;
    line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ocard-product.text-only .pname { font-size: 16px; }
  .pinfo .psub {
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
    font-size: 12px; color: var(--seal); line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pinfo .ptag { background: #f3f4f6; color: var(--seal); font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .pinfo .pval { font-size: 13px; color: var(--carbon); }
  .ocard-product .chev { width: 16px; height: 16px; flex-shrink: 0; opacity: .55; }

  .ocard.live {
    padding: 14px 14px 12px;
  }
  .ocard.live .ocard-dates { margin-top: 10px; }
  .ocard.live .ocard-foot { margin-top: 10px; padding-top: 9px; }

  .ocard-foot { margin-top: 12px; padding-top: 10px; border-top: .5px solid #eef0f4; }
  .ocard-foot span { color: var(--pool-500); font-size: 13px; }

  /* ===== 底部 Tab Bar ===== */
  .tabbar {
    position: relative; z-index: 3;
    width: 100%; height: 71.5px; flex-shrink: 0;
    background: #fff; border-radius: 12px 12px 0 0;
    box-shadow: 0 -1px 6px rgba(0,0,0,.06);
    display: flex; align-items: flex-start;
  }
  .tab {
    flex: 1; height: 71px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 10px 0 20px; text-decoration: none;
  }
  .tab img { width: 22px; height: 22px; }
  .tab .label { font-size: 10px; letter-spacing: .1px; color: var(--seal); }
  .tab.active .label { color: var(--pool-500); }
  .tab .icon-spacer { width: 20.2px; height: 15px; }

  /* 中间悬浮 + 按钮 */
  .fab {
    position: absolute; left: 50%; bottom: 30px; transform: translateX(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--pool-500);
    box-shadow: 0 6px 16px rgba(65,105,225,.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .fab img { width: 24px; height: 24px; }
</style>

  <script>
    function escapeHtml(str){
      return window.I18n ? I18n.escapeHtml(str) : String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function mapStatusLabel(status){
      var map = {
        pending_verification: 'status.pendingVerification',
        in_progress: 'status.inProgress',
        report_completed: 'status.reportCompleted',
        cancelled: 'status.pendingConfirmation'
      };
      var key = map[status];
      return key && typeof t === 'function' ? t(key) : (status || '');
    }

    function statusTone(status){
      if(status === 'report_completed') return 'green';
      return 'blue';
    }

    function formatDate(value){
      if(!value) return '';
      return String(value).slice(0, 10);
    }

    function liveOrderCard(row){
      var ref = row.order_ref || row.application_no || '';
      var appNo = row.application_no || ref;
      var status = row.status || 'pending_verification';
      var product = row.product_name || row.category || row.project_name || '';
      if(!product && typeof t === 'function') product = t('orderChat.productUnrecognized') || '—';
      if(!product) product = '—';
      var ordered = formatDate(row.ordered_at || row.created_at);
      var sub = row.service_type || row.project_name || row.program || '';
      if(sub && product && String(sub).toLowerCase() === String(product).toLowerCase()) sub = '';
      var subHtml = sub
        ? '<div class="psub">' + escapeHtml(sub) + '</div>'
        : '';
      return '<a class="ocard live" href="order-detail.html?order=' + encodeURIComponent(ref) + '">'+
        '<div class="ocard-head">'+
          '<div class="left">'+
            '<img src="assets/order_icon.svg" alt="" />'+
            '<span class="lbl">' + (typeof t === 'function' ? t('common.orderNo') : '申请单号：') + '</span>'+
            '<span class="num">' + escapeHtml(appNo) + '</span>'+
          '</div>'+
          '<div class="status ' + statusTone(status) + '">' + escapeHtml(mapStatusLabel(status)) + '</div>'+
        '</div>'+
        '<div class="ocard-dates">'+
          '<div class="date-pill">'+
            '<svg width="12" height="12" viewBox="0 0 16 16"><rect x="2.5" y="3" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M2.5 6.5h11M5.5 1.8v2.4M10.5 1.8v2.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'+
            '<span>' + (typeof t === 'function' ? t('common.orderDate') : '下单日期') + '</span> ' + escapeHtml(ordered) +
          '</div>'+
        '</div>'+
        '<div class="ocard-product text-only">'+
          '<div class="pinfo">'+
            '<div class="pname">' + escapeHtml(product) + '</div>'+
            subHtml +
          '</div>'+
          '<img class="chev" src="assets/chevron_row.svg" alt="" />'+
        '</div>'+
        '<div class="ocard-foot"><span>' + (typeof t === 'function' ? t('common.viewAll') : '查看全部') + '</span></div>'+
      '</a>';
    }

    function loadLiveOrders(){
      var api = window.QimaSupabase;
      var list = document.getElementById('orderList');
      if(!api || !api.ready() || !list) return;
      api.getFullOrders().then(function(rows){
        if(!rows || !rows.length) return;
        var html = rows.slice(0, 20).map(liveOrderCard).join('');
        list.insertAdjacentHTML('afterbegin', html);
      }).catch(function(err){
        console.warn('load live orders failed', err);
      });
    }

    if (window.I18n) I18n.initLangToggle();
    loadLiveOrders();
